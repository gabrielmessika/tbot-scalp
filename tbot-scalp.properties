# ===== T-Bot Scalp — Production Overrides =====
# Copy this file next to the JAR and customize

# Exchange
scalp.exchange=hyperliquid

# Market data
scalp.coins=BTC,SOL,HYPE,SUI,DOGE,AVAX,LINK,ADA,XRP,WIF,OP,APT,SEI,INJ,TIA,JUP,ONDO,RENDER,FET,WLD,NEAR,AAVE,MKR,PENDLE,STX,ATOM
scalp.timeframes=1m,3m

# Backtest data source (Binance Futures for 1m/3m history, Hyperliquid limited to 5000 candles)
scalp.backtest-use-binance=true

# Backtest sessions (date:windowDays:Label — régimes de marché identifiés)
scalp.backtest-sessions=2025-04-07:7:Bull Run,2025-06-01:7:Range,2025-08-10:7:Bear,2025-11-03:7:Crash,2026-02-06:7:Recovery,0:3:Current

# Execution
scalp.auto-trade=false
scalp.live-trading=false

# Pair scoring bonus
#scalp.pair-scoring.BTC=0.5
#scalp.pair-scoring.ETH=0.5

# API keys (NEVER commit real keys!)
#scalp.hyperliquid-private-key=0x...
#scalp.hyperliquid-wallet-address=0x...
