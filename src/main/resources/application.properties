# ===== T-Bot Scalp — Application Properties =====
server.port=9091

# Thread pool
spring.task.scheduling.pool.size=3

# Config import
spring.config.import=optional:file:./tbot-scalp.properties

# ===== Exchange =====
scalp.exchange=hyperliquid
scalp.hyperliquid-api-url=https://api.hyperliquid.xyz
scalp.hyperliquid-ws-url=wss://api.hyperliquid.xyz/ws

# ===== Market Data =====
scalp.coins=BTC,SOL,HYPE,SUI,DOGE,AVAX,LINK,ADA,XRP,WIF,OP,APT,SEI,INJ,TIA,JUP,ONDO,RENDER,FET,WLD,NEAR,AAVE,MKR,PENDLE,STX,ATOM
scalp.timeframes=1m,3m

# ===== Backtest =====
scalp.backtest-use-binance=true
scalp.backtest-days=7
scalp.backtest-sessions=2025-04-07:7:Bull Run,2025-06-01:7:Range,2025-08-10:7:Bear,2025-11-03:7:Crash,2026-02-06:7:Recovery,0:3:Current
scalp.portfolio-balances=200,500,1000,2500
scalp.entry-slippage-percent=0.03
scalp.exit-slippage-percent=0.04
scalp.taker-fee-percent=0.035

# ===== Position Sizing =====
scalp.position-size-percent=15
scalp.min-position-size=11
scalp.dry-run-balance=1000
scalp.min-leverage=5
scalp.max-leverage=50
scalp.max-sl-percent=1.5

# ===== Execution =====
scalp.auto-trade=false
scalp.live-trading=false
scalp.max-open-positions=8
scalp.max-margin-usage-percent=60
scalp.max-loss-per-trade-percent=3
scalp.max-daily-loss-percent=10
scalp.max-drawdown-percent=20
scalp.drawdown-throttle-start=7
scalp.drawdown-throttle-severe=12

# ===== Scoring =====
scalp.confident-threshold=12.5
scalp.min-score=4.0
scalp.atr-period=14
scalp.rsi-period=14

# ===== Strategies =====
scalp.ema-cross-enabled=true
scalp.rsi-divergence-enabled=true
scalp.vwap-bounce-enabled=true
scalp.bollinger-squeeze-enabled=true
scalp.order-flow-enabled=true
scalp.momentum-scalp-enabled=true

scalp.strategy-weights.EMA\ Crossover=2.0
scalp.strategy-weights.RSI\ Divergence=2.5
scalp.strategy-weights.VWAP\ Bounce=3.0
scalp.strategy-weights.Bollinger\ Squeeze=2.5
scalp.strategy-weights.Order\ Flow=3.5
scalp.strategy-weights.Momentum\ Scalp=3.0

# ===== Timeframe Settings =====
scalp.timeframe-settings.1m.scoring-bonus=0.5
scalp.timeframe-settings.1m.break-even-trigger-percent=55.0
scalp.timeframe-settings.3m.scoring-bonus=0.8
scalp.timeframe-settings.3m.break-even-trigger-percent=50.0

# ===== Trailing Stop =====
scalp.trailing-stop-atr-mult=1.5

# ===== Cooldown =====
scalp.cooldown-multiplier=2

# ===== Contrary Signals =====
scalp.contrary-signal-enabled=true
scalp.contrary-signal-threshold=3

# ===== Startup =====
scalp.startup-backtest=true
scalp.startup-checks=true
scalp.max-signal-age-candles-live=3

# ===== Logging =====
logging.level.com.tbot.scalp=INFO
logging.file.name=logs/tbot-scalp.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5
